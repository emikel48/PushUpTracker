name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Xcode project
        run: |
          # Crear proyecto iOS
          mkdir -p MyApp
          cd MyApp
          
          # Crear Info.plist
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>MyApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.example.MyApp</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>MyApp</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIDeviceFamily</key>
              <array>
                <integer>1</integer>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF
          
          # Crear AppDelegate
          cat > AppDelegate.swift << 'EOF'
          import UIKit
          
          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF
          
          # Crear ViewController simple
          cat > ViewController.swift << 'EOF'
          import UIKit
          
          class ViewController: UIViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = .systemBlue
                  
                  let label = UILabel()
                  label.text = "👃 PushUp Tracker"
                  label.textColor = .white
                  label.font = .systemFont(ofSize: 32, weight: .bold)
                  label.textAlignment = .center
                  label.translatesAutoresizingMaskIntoConstraints = false
                  view.addSubview(label)
                  
                  NSLayoutConstraint.activate([
                      label.centerXAnchor.constraint(equalTo: view.centerXAnchor),
                      label.centerYAnchor.constraint(equalTo: view.centerYAnchor)
                  ])
                  
                  let tap = UITapGestureRecognizer(target: self, action: #selector(tapped))
                  view.addGestureRecognizer(tap)
              }
              
              @objc func tapped() {
                  let generator = UIImpactFeedbackGenerator(style: .light)
                  generator.impactOccurred()
                  print("Flexión contada!")
              }
          }
          EOF
      
      - name: Compile iOS app
        run: |
          cd MyApp
          # Compilar para iOS
          swiftc -sdk $(xcrun --show-sdk-path --sdk iphoneos) \
                 -target arm64-apple-ios15.0 \
                 -emit-executable \
                 -o MyApp \
                 AppDelegate.swift ViewController.swift
          
          # Verificar que se creó el binario
          ls -la MyApp
          file MyApp
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-binary
          path: MyApp/MyApp
